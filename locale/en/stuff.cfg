[mod-description]
syso=This mod is my own attempt at insuring against damage while AFKing in multiplayer. When every player has been idle for 10 minutes, the world will save and consider itself to be AFK. If your character takes damage or certain entities die in this state, it will automatically pause the game.\n\nThese buildings include:\nCrafting machines\nTurrets\nRails\nVehicles\nCircuit network stuff\n\n

[mod-setting-name]
syso-time-to-afk=Time until AFK (minutes)
syso-max-world-afk-time=Maximum world AFK time (minutes)
syso-should-save-on-world-afk=Autosave on AFK
syso-can-anyone-unpause=Anyone can unpause

[mod-setting-description]
syso-time-to-afk=The amount of minutes a given player must be inactive for to be considered AFK.
syso-max-world-afk-time=The amount of minutes the last active player can be AFK for before the server pauses. Set to 0 to make the server pause the moment everyone is AFK.
syso-should-save-on-world-afk=Whether the game should autosave when the world becomes AFK. Won't overwrite other autosaves.
syso-can-anyone-unpause=Allows non-admins to unpause the game after it automatically pauses while in AFK status.

[syso]
# ... Probably shouldn't change this, because it lets people know that this mod paused the game (in case they want to remove it from a large pack)
autopaused=World auto-paused
show=Take me there
world-unafk=[syso] The world is no longer AFK.
world-afk=[syso] The world is now AFK.
#afk-panic=World auto-paused. Type 'tick-unpause' in the console (Backtick ` by default) to resume.
afk-panic=[syso] AFK world being automatically paused because __1__ was in harm's way.
how-to-resume=[syso] Type /tick-unpause in the console ( __CONTROL__toggle-console__ ) or use the GUI to resume.
player-now-afk=[syso] __1__ is now AFK.
deny-unpause=[syso] Only admins can unpause the game.

[syso-commands]
tick-unpause=- Unpauses the world.
tick-pause=- Pauses the world.
tick-advance=<amount> - Advances the game by a certain amount of ticks when paused. Amount defaults to 1.
tick-advance-error-1=World must be paused to use this. You can use the command 'tick-pause'.